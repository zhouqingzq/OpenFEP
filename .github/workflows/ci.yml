name: Segmentum CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  acceptance-soak:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install .
      - name: Run M0 acceptance soak
        run: python scripts/soak_runtime.py --profile m0 --cycles 1000 --seed 17

  nightly-acceptance-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install .
      - name: Run nightly acceptance soak
        run: python scripts/soak_runtime.py --profile nightly --cycles 1000 --seed 17
